name: Build & Test

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "2.1.14"
  ANCHOR_VERSION: "0.30.1"
  RUST_VERSION: "1.81.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build Liquid Staking Program
        run: cargo-build-sbf --manifest-path programs/liquid-staking/Cargo.toml

      - name: Build Early Purchase Program
        run: cargo-build-sbf --manifest-path programs/early-purchase/Cargo.toml

      - name: Run Rust Unit Tests
        run: cargo test --manifest-path programs/liquid-staking/Cargo.toml

      - name: Upload Program Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: program-binaries
          path: |
            target/deploy/liquid_staking.so
            target/deploy/early_purchase.so

  anchor-tests:
    needs: build
    runs-on: ubuntu-latest
    # LiteSVM has a native memory leak: each new LiteSVM instance leaks native heap
    # that V8 GC cannot free. Tests that instantiate multiple SVMs OOM the runner.
    # Until tests are refactored to share SVM per file, this job is advisory only.
    # Integration testing happens on devnet (scripts/devnet_full_test.py).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anchor CLI
        run: npm i -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Install dependencies
        run: yarn install

      - name: Download compiled programs
        uses: actions/download-artifact@v4
        with:
          name: program-binaries
          path: target/deploy/

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --force

      - name: Run LiteSVM Tests
        env:
          NODE_OPTIONS: "--max-old-space-size=6144 --expose-gc"
        run: |
          FAILED=0
          for f in tests/unit-tests/authority-transfer.test.ts \
                   tests/unit-tests/guardian-management.test.ts \
                   tests/unit-tests/pair-configuration.test.ts \
                   tests/unit-tests/pair-validation.test.ts \
                   tests/unit-tests/program-sealing.test.ts \
                   tests/unit-tests/rate-calculations.test.ts \
                   tests/unit-tests/rates.test.ts \
                   tests/unit-tests/staking.test.ts \
                   tests/unit-tests/token-metadata.test.ts \
                   tests/unit-tests/vault-management.test.ts \
                   tests/unit-tests/whitelist.test.ts \
                   tests/unit-tests/swap-lst.test.ts \
                   tests/unit-tests/withdrawal.test.ts \
                   tests/unit-tests/close-withdrawal-window.test.ts; do
            echo "======= Running $f ======="
            if yarn run ts-mocha -p ./tsconfig.json -t 1000000 "$f" 2>&1; then
              echo "======= PASSED: $f ======="
            else
              echo "======= FAILED: $f ======="
              FAILED=$((FAILED+1))
            fi
          done
          echo "======= TOTAL FAILURES: $FAILED ======="
          if [ $FAILED -gt 0 ]; then exit 1; fi
