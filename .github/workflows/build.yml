name: Build & Test

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "2.2.14"
  ANCHOR_VERSION: "0.30.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Build Program
        run: anchor build

      - name: Run Unit Tests
        run: cargo test --manifest-path programs/liquid-staking/Cargo.toml

      - name: Upload Program Artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquid-staking-program
          path: target/deploy/liquid_staking.so
