name: Build & Test

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "2.1.14"
  ANCHOR_VERSION: "0.30.1"
  RUST_VERSION: "1.81.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build SBF Program
        run: cargo-build-sbf --manifest-path programs/liquid-staking/Cargo.toml

      - name: Run Unit Tests
        run: cargo test --manifest-path programs/liquid-staking/Cargo.toml

      - name: Upload Program Artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquid-staking-program
          path: target/deploy/liquid_staking.so
